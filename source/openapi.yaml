components:
  securitySchemes:
    ClientKey: { type: apiKey, in: header, name: ClientKey }
    SecretKey: { type: apiKey, in: header, name: SecretKey }

  parameters:
    page:
      name: page
      in: query
      description: Page number (pagination), starting at 1. Values below 1 are rejected with `400 Bad Request`.
      schema: { type: integer, default: 1, minimum: 1 }
    size:
      name: size
      in: query
      description: Items per page (pagination), max 50. Values above 50 (or negative) are rejected with `400 Bad Request`.
      schema: { type: integer, default: 25, minimum: 1, maximum: 50 }
    userId:
      name: id
      in: path
      required: true
      description: The ID of the user.
      schema: { type: string, format: uuid }
    resourceId:
      name: id
      in: path
      required: true
      description: The ID of the resource.
      schema: { type: string }

  responses:
    Unauthorized:
      description: Authentication failed — missing or invalid `ClientKey`/`SecretKey`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: The request failed validation (missing or invalid fields).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: >
        Rate limit exceeded. Each ClientKey may make up to 200 requests/minute, shared
        across all `/beta` endpoints; exceeding it triggers an escalating cooldown
        (starting at 1 minute). See the Rate Limiting section.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema: { type: integer }
        X-RateLimit-Limit:
          description: Maximum requests allowed in the current window.
          schema: { type: integer }
        X-RateLimit-Remaining:
          description: Requests remaining in the current window.
          schema: { type: integer }
        X-RateLimit-Reset:
          description: Epoch seconds when the window resets.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/RateLimitError' }

  schemas:
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        size: { type: integer, example: 25 }
        has_more: { type: boolean, example: false }
        total_records: { type: integer, example: 1 }
    PaginatedEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        pagination: { $ref: '#/components/schemas/Pagination' }
    Error:
      type: object
      properties:
        error_type: { type: string, example: validation_error }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string, example: name }
              message: { type: string, example: Mandatory attribute missing }
              code: { type: string, example: missing_field }
    RateLimitError:
      type: object
      properties:
        error_type: { type: string, example: rate_limit_exceeded }
        message: { type: string, example: "Rate limit exceeded. Please retry later." }
    DisplayPicture:
      type: object
      properties:
        small: { type: string, format: uri, nullable: true }
        medium: { type: string, format: uri, nullable: true }
        large: { type: string, format: uri, nullable: true }
    NamedRef:
      type: object
      properties:
        id:
          oneOf: [ { type: string }, { type: integer } ]
          description: String or integer depending on the reference type.
          example: "261"
        name: { type: string, example: CEO }
    OrgMembership:
      type: object
      properties:
        id: { type: string, example: f5afec62-21ff-40d3-a06e-9a2162ef6b69 }
        name: { type: string, example: Customer Support }
        is_admin: { type: boolean }

    UserAttribute:
      type: object
      properties:
        name: { type: string, example: Title }
        attribute_key: { type: string, example: custom-attribute-93cbf }
        preset: { type: boolean, description: "true for system, false for custom attributes." }
        mandatory: { type: boolean }
        data_type:
          type: string
          enum: [text, number, date, boolean, single-select, multiple-select, document]
        attribute_options:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id: { type: integer, example: 313 }
              value: { type: string, example: "Mr." }

    User:
      type: object
      properties:
        id: { type: string, format: uuid, example: b62167d0-2718-4e45-9721-27535991becf }
        name: { type: string, example: Adam Smith }
        status: { type: string, example: Active }
        email: { type: string, format: email, example: adam.smith@teamyogi.com }
        first_name: { type: string, example: Adam }
        middle_name: { type: string, nullable: true }
        last_name: { type: string, example: Smith }
        title: { type: string, nullable: true, description: "Title of the user (e.g. `Mr.`), or null." }
        nickname: { type: string, nullable: true }
        marital_status: { type: string, nullable: true }
        employee_id: { type: string, example: E007 }
        employee_type:
          description: "Employee type as `{ id, name }` (e.g. `Non-Exempt`), or null."
          allOf: [ { $ref: '#/components/schemas/NamedRef' } ]
        gender: { type: string, nullable: true }
        birthdate: { type: string, nullable: true, description: Date of birth of the user. }
        joining_date: { type: string, nullable: true }
        last_active_date: { type: string, nullable: true }
        block_reason_code: { type: string, nullable: true, description: "Reason code recorded when the user was deactivated, or null." }
        user_blocked_at: { type: string, nullable: true, description: "When the user was deactivated, or null." }
        phone_number: { type: string, nullable: true }
        linkedin: { type: string, nullable: true }
        twitter: { type: string, nullable: true }
        differently_abled: { type: boolean, nullable: true }
        veteran_status: { type: boolean, nullable: true }
        ethnicity: { type: string, nullable: true }
        employee_level: { type: string, nullable: true }
        level: { type: string, nullable: true, description: Level of the employee. }
        is_cxo: { type: boolean }
        display_picture:
          description: "Profile picture URLs, or null."
          allOf: [ { $ref: '#/components/schemas/DisplayPicture' } ]
        job_title:
          description: "The user's job title as `{ id, name }`, or null."
          allOf: [ { $ref: '#/components/schemas/NamedRef' } ]
        location:
          description: "The user's location as `{ id, name }`, or null."
          allOf: [ { $ref: '#/components/schemas/NamedRef' } ]
        business_unit:
          type: array
          description: Business units the user belongs to.
          items: { $ref: '#/components/schemas/OrgMembership' }
        education: { type: string, nullable: true, description: "Single-user endpoint only." }
        about_me: { type: string, nullable: true, description: "Single-user endpoint only." }
        secondary_phone_number: { type: string, nullable: true, description: "Single-user endpoint only." }
        promotion_date: { type: string, nullable: true, description: "Impending promotion date of the employee. Single-user endpoint only." }
        review_date: { type: string, nullable: true, description: "Impending review date of the employee. Single-user endpoint only." }
        joining_date_string: { type: string, nullable: true, description: "Formatted variant of `joining_date`. Single-user endpoint only." }
        birthdate_as_date: { type: string, nullable: true, description: "Date-typed variant of `birthdate`. Single-user endpoint only." }
        work_anniversary_in: { type: integer, description: "Days until the user's next work anniversary. Single-user endpoint only." }
        is_admin: { type: boolean, nullable: true, description: "Whether the user is a site administrator, or null. Single-user endpoint only." }
        primary_reporter:
          description: "The user's manager, or null. Embedded when `include=primary_reporter` is requested."
          allOf: [ { $ref: '#/components/schemas/User' } ]
        direct_reports:
          type: array
          description: "Users reporting to this user. Embedded when `include=direct_reports` is requested."
          items: { $ref: '#/components/schemas/User' }
        hr_managers:
          type: array
          description: "The user's HR managers. Embedded when `include=hr_managers` is requested (single-user endpoint only)."
          items: { $ref: '#/components/schemas/User' }
        secondary_managers:
          type: array
          description: "The user's secondary managers. Embedded when `include=secondary_managers` is requested (single-user endpoint only)."
          items: { $ref: '#/components/schemas/User' }
        departments:
          type: array
          items: { $ref: '#/components/schemas/OrgMembership' }
        custom_attributes:
          type: object
          additionalProperties:
            type: object
            properties:
              name: { type: string }
              value:
                oneOf:
                  - { type: string }
                  - { type: array, items: { type: string } }
          description: Custom fields keyed by their `attribute_key`.
    UserEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/User' }
    UserWriteRequest:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name: { type: string, example: John }
        middle_name: { type: string }
        last_name: { type: string, example: Doe }
        email: { type: string, format: email, example: john.doe@company.com }
        employee_id: { type: string, example: EMP001 }
        employee_type: { type: string, description: Type to which the employee belongs. }
        promotion_date: { type: string }
        review_date: { type: string }
        level: { type: string }
        phone_number: { type: string }
        secondary_phone_number: { type: string }
        joining_date: { type: string, format: date }
        birth_date: { type: string, format: date }
        location: { type: string, description: ID of the location. }
        job_title: { type: string, description: ID of the job title. }
        departments: { type: array, items: { type: string }, example: ["dept-123"] }
        businesses: { type: array, items: { type: string }, example: ["biz-456"] }
        hr_managers: { type: array, items: { type: string }, example: ["manager-789"] }
        secondary_managers: { type: array, items: { type: string } }
        manager_id: { type: string }
        custom_attributes:
          type: object
          description: Custom attributes keyed by their `attribute_key` (use GET /beta/user-attributes to discover them).
      additionalProperties:
        description: Custom attributes may alternatively be sent as individual `custom-attribute-*` fields.

    Member:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: Adam Smith }
        email: { type: string, format: email }
        first_name: { type: string }
        middle_name: { type: string, nullable: true }
        last_name: { type: string }
        display_picture: { $ref: '#/components/schemas/DisplayPicture' }
        is_admin: { type: boolean }
    OrgUnitSummary:
      description: A department or business unit (list representation — members are not included).
      type: object
      properties:
        id: { type: string, format: uuid, example: f5afec62-21ff-40d3-a06e-9a2162ef6b69 }
        name: { type: string, example: Customer Support }
        members_count: { type: integer, example: 10 }
        administrators_count: { type: integer, example: 2 }
    OrgUnit:
      description: A department or business unit.
      allOf:
        - $ref: '#/components/schemas/OrgUnitSummary'
        - type: object
          properties:
            members:
              type: array
              items: { $ref: '#/components/schemas/Member' }
    OrgUnitEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/OrgUnit' }
    OrgUnitWriteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Customer Support }
        members:
          type: array
          items: { type: string }
          description: Array of user IDs.

    Location:
      type: object
      properties:
        id: { type: integer, example: 3927 }
        name: { type: string, example: Head Office }
        address_line1: { type: string }
        address_line2: { type: string, nullable: true }
        city: { type: string }
        state: { type: string }
        country: { type: string }
        postal_code: { type: string }
    LocationEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/Location' }
    LocationWriteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Head Office }
        address_line1: { type: string }
        address_line2: { type: string }
        city: { type: string }
        state: { type: string }
        country: { type: string }
        postal_code: { type: string }

    JobTitle:
      type: object
      properties:
        id: { type: integer, example: 11424 }
        name: { type: string, example: Software Engineer }
        description: { type: string, nullable: true }
        responsibilities: { type: string, nullable: true }
    JobTitleEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/JobTitle' }
    JobTitleWriteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Software Engineer }
        description: { type: string }
        responsibilities: { type: string }

    Permission:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: Site Administrator }
        is_admin: { type: boolean, nullable: true }
        description: { type: string, nullable: true }
        is_editable: { type: boolean, description: Whether the permission can be edited. }
        default: { type: boolean, description: Whether the permission is granted by default. }

    BlockReasonCode:
      type: object
      properties:
        code:
          type: string
          description: "Codes are organisation-configurable; system codes include `involuntary`, `voluntary`, `dismissal_with_cause`, `retirement`, `temporary_leave`, `not_known`."
          example: involuntary
        display_text: { type: string, example: Involuntary }
        description: { type: string }
        source: { type: string, description: "`system` for built-in codes, otherwise org-defined.", example: system }
        archived: { type: boolean }
        created_by: { type: string, nullable: true }
        updated_at: { type: string }
        blocked_users_count: { type: integer, description: Number of users currently deactivated with this code. }

    Actor:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        designation: { type: string }
        display_picture:
          type: object
          properties:
            large: { type: string, nullable: true }
            original: { type: string, nullable: true }
            reduced: { type: string, nullable: true }
    Praise:
      type: object
      properties:
        id: { type: integer, example: 107781 }
        activity_type: { type: string, example: Praise }
        activity_date: { type: string, format: date-time }
        last_updated_at: { type: string, format: date-time }
        title: { type: string, nullable: true }
        content: { type: string }
        pinned: { type: boolean }
        author: { $ref: '#/components/schemas/Actor' }
        tags:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              label: { type: string }
        audience:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              type: { type: string, example: Group }
              display_picture: { type: object }
        links: { type: array, items: {} }
        attachments: { type: array, items: {} }
        comment_details:
          type: object
          properties: { count: { type: integer } }
        like_details:
          type: object
          properties:
            count: { type: integer }
            is_liked: { type: boolean }
        can_edit: { type: boolean }
        can_delete: { type: boolean }
        recognized_actors:
          type: array
          items: { $ref: '#/components/schemas/Actor' }

    LearnerRef:
      type: object
      description: >
        The learner. Alongside the fixed fields below, the object carries the
        learner's demographic fields and the organisation's custom attributes as
        additional keys.
      properties:
        id: { type: string, format: uuid, description: "The user's unique Engagedly ID (stable across Engagedly services)." }
        name: { type: string }
        email: { type: string, format: email }
        status: { type: string }
        employee_id: { type: string }
        job_title: { type: string, nullable: true, description: Job title name. }
        business_units: { type: array, items: { type: string }, description: Business unit names. }
        departments: { type: array, items: { type: string }, description: Department names. }
        location: { type: string, nullable: true, description: Location name. }
        employee_type: { type: string, nullable: true }
        joining_date: { type: string, nullable: true }
        birth_date: { type: string, nullable: true }
        gender: { type: string, nullable: true }
        ethnicity: { type: string, nullable: true }
        differently_abled: { type: boolean, nullable: true }
        veteran_status: { type: boolean, nullable: true }
        age: { type: integer, nullable: true }
        display_picture: { type: object }
      additionalProperties: true
    LearnerRecord:
      type: object
      properties:
        id: { type: integer, description: Unique ID of this learner enrolment record. }
        learning_resource_id: { type: integer, description: Internal unique ID of the course. }
        learning_resource_title: { type: string }
        type: { type: string, enum: [Course, Playlist, Section] }
        short_code: { type: string, description: Unique code of the course. }
        completion_status:
          type: string
          enum: [Not Started, In Progress, Completed, Failed, Evaluation Pending]
        points: { type: integer }
        completed_on: { type: string, nullable: true }
        certified: { type: boolean }
        mandatory: { type: boolean }
        progress: { type: integer, description: Completion percentage. }
        provider: { type: string, example: engagedly }
        archive: { type: boolean }
        categories:
          type: array
          items:
            type: object
            properties: { id: { type: integer }, title: { type: string } }
        learner: { $ref: '#/components/schemas/LearnerRef' }
        assigner: { type: object, nullable: true }
        manager: { type: object, nullable: true }
        hr_managers: { type: array, items: { type: object } }
        secondary_managers: { type: array, items: { type: object } }
        author: { type: object, nullable: true }
        assigned_on: { type: string }
        overall_time_taken: { type: number, description: "Total time spent, in seconds." }
        due_date: { type: string, nullable: true }
        delay_in_days: { type: integer, nullable: true }
        language: { type: string }
        learning_resource_duration: { type: number, description: "Estimated course duration, in seconds." }
        compliance_status: { type: string, nullable: true }
        valid_till: { type: string, nullable: true }
        is_self_assigned: { type: boolean }
    LearningResource:
      type: object
      properties:
        id: { type: integer, description: "Internal unique ID of the resource (the learning_resource_id)." }
        title: { type: string }
        description: { type: string, nullable: true }
        provider: { type: string, example: engagedly }
        archived: { type: boolean }
        language: { type: string }
        duration: { type: string, description: "Estimated duration, formatted HH:MM:SS.", example: "01:00:00" }
        short_code: { type: string, description: "Unique code of the resource." }
        level: { type: string }
        type: { type: string, enum: [Course, Playlist, Section] }
        state: { type: string, enum: [Published, Unpublished, UnpublishedEdit] }
        in_library: { type: boolean }
        published_on: { type: string, nullable: true }
        average_rating: { type: number, nullable: true }
        tags: { type: array, items: { type: string } }
        competencies: { type: array, items: { type: object } }
        categories:
          type: array
          items:
            type: object
            properties: { id: { type: integer }, title: { type: string } }
        author: { type: object, nullable: true }
        co_authors: { type: array, items: { type: object } }
        skills: { type: array, items: { type: object } }
        cover_image: { type: string, format: uri, nullable: true, description: "URL of the resource's cover image, or null." }
        settings: { type: object, description: "Resource settings as key–value pairs." }
        attributes: { type: object, description: "Resource attributes as key–value pairs." }
        content_details: { type: object, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
    ResourceSection:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        type: { type: string, example: Section }
        status: { type: string }
        ongoing_edit: { type: boolean }
        position: { type: integer }
        content_status: { type: string, enum: [Published, Unpublished, UnpublishedEdit, MarkedForDeletion] }
        units:
          type: array
          description: "Content items in the section (courses). Playlists nest resources under `contents` instead."
          items: { $ref: '#/components/schemas/ResourceUnit' }
    ResourceUnit:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        type: { type: string, enum: [Attachment, RichText, Link, Quiz, SurveyStep, VideoContent, InstructorTraining, SCORM, AICC, LTI] }
        position: { type: integer }
        duration: { type: integer, description: "Estimated duration in minutes." }
        unit_details: { type: object, description: "Type-specific detail; varies by `type` — e.g. a link URL, attachment file, quiz configuration, video source." }
        status: { type: string, enum: [Active, Draft] }
        content_status: { type: string, enum: [Active, Draft, UnpublishedEdit, MarkedForDeletion] }
        ongoing_edit: { type: boolean, nullable: true }
        mark_for_deletion: { type: boolean }
        has_impact: { type: boolean }
        completion_watch_threshold_pct: { type: integer, nullable: true }
        completion_time_threshold_pct: { type: integer, nullable: true }
        completion_require_scroll: { type: boolean }
        created_at: { type: string }
        updated_at: { type: string }
