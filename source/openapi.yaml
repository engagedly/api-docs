openapi: 3.0.3
info:
  title: Engagedly API
  version: beta
  description: |
    Reference documentation for the Engagedly API.

    **Downloads:** [OpenAPI spec](openapi.yaml) · [Postman collection](engagedly-api.postman_collection.json)

    # Getting Started

    ## Authentication

    Every request is authenticated with a **Client Key** and **Secret Key**, sent as the
    `ClientKey` and `SecretKey` request headers. Keys are generated by a **Site Administrator**
    under *Integrations → Engagedly API*. You must be a Site Administrator to generate them, and
    the keys carry the permissions of the user who generated them. **The secret key is shown only
    once — copy it when you generate it.** The API does **not** support CORS.

    ```bash
    curl "https://api.engagedly.com/beta/users" \
      -H "ClientKey: xxxxxxxxxxxxxx" \
      -H "SecretKey: xxxxxxxxxxxxxx"
    ```

    ## Requests

    All requests specify an API version in the URL. The current version is **beta**; the base
    endpoint is `https://api.engagedly.com/beta/`. All requests must use HTTPS (plain HTTP fails).
    `POST`/`PUT`/`PATCH` bodies are JSON and require `Content-Type: application/json` (otherwise
    the API returns `415 Unsupported Media Type`).

    The API is plain JSON over HTTP and uses the following HTTP verbs:

    | Verb | Purpose |
    | ---- | ------- |
    | `GET` | Get one or more entities. |
    | `POST` | Create an entity. |
    | `PUT` | Update an entity. |
    | `DELETE` | Delete an entity. |

    ## Responses & pagination

    Successful responses are JSON with a `success: true` flag. A single resource is represented
    as a JSON object; a collection of resources as a JSON array of objects. Blank fields are
    included as `null` instead of being omitted (blank arrays as `[]`). Timestamps are in UTC
    and formatted as ISO8601.

    List endpoints are paginated via the `page` and `size` query parameters; responses include
    a `pagination` object with `page`, `size`, `has_more`, and `total_records`.

    Pagination rules are enforced centrally for **all** `/beta` endpoints: `page` starts at
    **1** and `size` may be at most **50** — a `size` above 50 (or negative), or a `page`
    below 1, is rejected with `400 Bad Request`. When omitted, `page` defaults to **1** and
    `size` defaults to **25** (Learning endpoints: **15**). The learner-reports endpoint
    requires `page` and `size` to be supplied explicitly.

    ## Rate limiting

    Requests are rate limited **per API credential (`ClientKey`)** — up to **200 requests per
    minute**, shared across all `/beta` endpoints (the limit is not tracked separately per
    endpoint).

    Every response includes headers describing your current rate-limit state:

    | Header | Description |
    | ------ | ----------- |
    | `X-RateLimit-Limit` | The maximum number of requests allowed in the current window. |
    | `X-RateLimit-Remaining` | The number of requests remaining in the current window. |
    | `X-RateLimit-Reset` | The epoch time (in seconds) when the current window resets. |
    | `Retry-After` | Seconds to wait before retrying. Present only on `429` responses. |

    When you exceed the limit the API responds `429 Too Many Requests` and applies a **cooldown**
    that **escalates** on repeated violations — starting at **1 minute**, then 3, 5, 10, up to
    15 minutes before resetting after a quiet period. Back off when you receive a `429`;
    repeatedly hitting the limit lengthens the cooldown. The `429` body is
    `{ "error_type": "rate_limit_exceeded", "message": "…" }`.

    ## HTTP status codes

    | Code | Meaning |
    | ---- | ------- |
    | 200 | OK — everything worked as expected. |
    | 201 | Created — one or more resources were created. |
    | 204 | No Content — succeeded, no response body. |
    | 400 | Bad Request — malformed or missing parameter. |
    | 401 | Unauthorized — invalid auth token. |
    | 402 | Request Failed — parameters valid but the request failed. |
    | 403 | Forbidden — insufficient permission, or not a user of the organization. |
    | 404 | Not Found — wrong URL, or the resource has moved. |
    | 405 | Method Not Allowed — HTTP method not supported for the resource. |
    | 406 | Not Acceptable — requested response type unsupported. |
    | 409 | Conflict — conflicts with another request. |
    | 415 | Unsupported Media Type — missing `application/json` content type on POST/PUT/PATCH. |
    | 422 | Unprocessable Entity — validation error creating/modifying a resource. |
    | 429 | Too Many Requests — too many requests within a time frame. |
    | 500 | Server Error — something went wrong on Engagedly's end. |

    ## Errors

    Errors return a body with an `error_type` and an `errors` array.

    **Error types**

    | Type | Description |
    | ---- | ----------- |
    | `api_connection_error` | Could not connect to the Engagedly API. |
    | `authentication_error` | Could not authenticate. |
    | `invalid_request_error` | The request had invalid parameters. |
    | `validation_error` | Field validation failed. |

    **Error codes** (in `errors[].code`)

    | Code | Description |
    | ---- | ----------- |
    | `missing_field` | A mandatory attribute is missing from the request. |
    | `duplicate_value` | The submitted value already exists. |

servers:
  - url: https://api.engagedly.com
    description: Production

security:
  - ClientKey: []
    SecretKey: []

tags:
  - name: User Attributes
    description: |
      User attributes capture standard (**system**) and organization-defined (**custom**) fields.
      System attributes are built-in (`preset: true`); custom attributes are org-defined
      (`preset: false`) and referenced by keys like `custom-attribute-93cbf`.

      **Important notes**
      - **Mandatory** attributes (`mandatory: true`) must be provided on user create/update.
      - **Select fields:** use the `value` from the attribute's `attribute_options` array.
      - **Boolean fields:** only `true`/`false` are accepted.
      - **Dates** accept `MMM DD, YYYY` (e.g. `Jan 02, 2022`) or `YYYY-MM-DD` (e.g. `2024-01-15`).

      **Data types** (`data_type`)

      | Type | Example values | Use cases |
      | ---- | -------------- | --------- |
      | `text` | "Engineering" | Names, descriptions, free text |
      | `number` | 5, 8.5 | Grades, ratings, quantities |
      | `date` | "2024-01-15" | Hire/birth dates, deadlines |
      | `boolean` | true, false | Yes/no flags |
      | `single-select` | "Meets Expectations" | Single choice from options |
      | `multiple-select` | ["JavaScript","Python"] | Multiple choices from options |
  - name: Users
    description: |
      Manage users, their profile fields, status, and permissions.

      **Custom attributes:** beyond the system fields, you can set organization-defined custom
      attributes on create/update. Use each attribute's `attribute_key` as the field name
      (discover them via `GET /beta/user-attributes`). System and custom attributes can be mixed
      in one request — either nested under `custom_attributes` or as individual
      `custom-attribute-*` fields. Example:

      ```json
      {
        "first_name": "Jane",
        "last_name": "Smith",
        "email": "jane.smith@company.com",
        "departments": ["dept-123"],
        "custom-attribute-93cbf": "Product Management",
        "custom-attribute-d3b49": 9
      }
      ```
  - name: Departments
  - name: Businesses
  - name: Locations
  - name: Job Titles
  - name: Permissions
  - name: Activities
  - name: Learning
    description: |
      Courses, playlists, their content hierarchy, and learner reporting. These
      endpoints are served at `https://api.engagedly.com/beta/learning/` and are
      **read-only**. Two identifiers are the stable join keys for mapping to your
      own data: `short_code` (human-readable course code) and `learning_resource_id`
      (internal course ID; returned as `id` on the resource itself). In learner
      reports, `learner.id` is the user's unique Engagedly ID, stable across
      Engagedly services.

paths:
  /beta/user-attributes:
    get:
      tags: [User Attributes]
      summary: List all user attributes
      description: Returns all user attributes (system + custom), including field configuration, validation rules, and options.
      responses:
        '200':
          description: The list of user attributes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UserAttribute' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users:
    get:
      tags: [Users]
      summary: List all users
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: include
          in: query
          description: "Comma-separated related data to embed. Allowed: `primary_reporter`, `direct_reports`."
          schema: { type: string, example: "primary_reporter,direct_reports" }
        - name: email
          in: query
          description: Filter by an email address.
          schema: { type: string }
      responses:
        '200':
          description: A paginated list of users.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
              example:
                success: true
                pagination: { page: 1, size: 25, has_more: false, total_records: 1 }
                data:
                  - id: b62167d0-2718-4e45-9721-27535991becf
                    name: Adam Smith
                    first_name: Adam
                    middle_name: null
                    last_name: Smith
                    email: adam.smith@teamyogi.com
                    status: Active
                    title: null
                    nickname: ""
                    marital_status: ""
                    last_active_date: null
                    employee_id: E007
                    block_reason_code: null
                    user_blocked_at: null
                    display_picture:
                      medium: https://social.engagedly.com/uploads/picture/file/9634/reduced_Adam.jpg
                      small: https://social.engagedly.com/uploads/picture/file/9634/small_Adam.jpg
                    job_title: { id: 11503, name: Manager }
                    location: { id: "3927", name: Bengaluru }
                    departments:
                      - { id: 61537d90-05f6-11ef-8fcc-fdfaf2ffaa91, name: Customer Support, is_admin: false }
                    business_unit:
                      - { id: 8e7345e0-b1f0-11ed-9b4b-8b54e79c50ef, name: Manufacturing Unit, is_admin: false }
                    employee_type: { id: 2033, name: Non-Exempt }
                    gender: null
                    birthdate: null
                    joining_date: "2024-01-15"
                    phone_number: null
                    linkedin: null
                    twitter: null
                    differently_abled: null
                    veteran_status: null
                    ethnicity: null
                    employee_level: null
                    level: null
                    is_cxo: false
                    custom_attributes:
                      custom-attribute-93cbf: { name: Department, value: Product Management }
                      custom-attribute-5d2c8:
                        name: Languages
                        value: [English, Kannada]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      tags: [Users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserWriteRequest' }
      responses:
        '201':
          description: The created user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users/block-reason-codes:
    get:
      tags: [Users]
      summary: Get block reason codes
      description: >
        Codes accepted by the deactivate endpoint's `block_reason_code`. Codes are
        organisation-configurable. Note: unlike most endpoints, the envelope is
        `{ "status": 200, "data": [...] }` (no `success` flag).
      responses:
        '200':
          description: The available block reason codes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: integer, example: 200 }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/BlockReasonCode' }
              example:
                status: 200
                data:
                  - code: involuntary
                    display_text: Involuntary
                    description: "Initiated by the business. Example, RIF (Reduction in Force)"
                    source: system
                    archived: false
                    created_by: null
                    updated_at: "2024-01-15T10:00:00.000Z"
                    blocked_users_count: 2
                  - code: voluntary
                    display_text: Voluntary
                    description: Initiated by the individual.
                    source: system
                    archived: false
                    created_by: null
                    updated_at: "2024-01-15T10:00:00.000Z"
                    blocked_users_count: 0
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users/{id}:
    parameters:
      - $ref: '#/components/parameters/userId'
    get:
      tags: [Users]
      summary: Get a single user
      parameters:
        - name: include
          in: query
          description: "Comma-separated related data to embed. Allowed: `primary_reporter`, `direct_reports`, `hr_managers`, `secondary_managers`."
          schema: { type: string, example: "primary_reporter,direct_reports,hr_managers,secondary_managers" }
      responses:
        '200':
          description: The requested user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
              example:
                success: true
                data:
                  id: b62167d0-2718-4e45-9721-27535991becf
                  name: Adam Smith
                  first_name: Adam
                  middle_name: null
                  last_name: Smith
                  email: adam.smith@teamyogi.com
                  status: Active
                  title: null
                  nickname: ""
                  marital_status: ""
                  last_active_date: null
                  employee_id: E007
                  block_reason_code: null
                  user_blocked_at: null
                  display_picture:
                    medium: https://social.engagedly.com/uploads/picture/file/9634/reduced_Adam.jpg
                    small: https://social.engagedly.com/uploads/picture/file/9634/small_Adam.jpg
                  job_title: { id: 11503, name: Manager }
                  location: { id: "3927", name: Bengaluru }
                  departments: []
                  business_unit: []
                  hr_managers: []
                  secondary_managers: []
                  employee_type: { id: 2033, name: Non-Exempt }
                  gender: null
                  birthdate: null
                  phone_number: null
                  linkedin: ""
                  twitter: ""
                  differently_abled: null
                  veteran_status: null
                  ethnicity: null
                  employee_level: null
                  level: null
                  is_cxo: false
                  joining_date: null
                  primary_reporter:
                    id: a1b2c3d4-2718-4e45-9721-27535991becf
                    name: Jane Doe
                    email: jane.doe@teamyogi.com
                    status: Active
                  direct_reports: []
                  education: "B.Tech, MS"
                  about_me: null
                  secondary_phone_number: ""
                  joining_date_string: null
                  birthdate_as_date: null
                  work_anniversary_in: 245
                  promotion_date: null
                  review_date: null
                  is_admin: null
                  custom_attributes:
                    custom-attribute-93cbf: { name: Department, value: Product Management }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      tags: [Users]
      summary: Update an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserWriteRequest' }
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    patch:
      tags: [Users]
      summary: Partially update an existing user
      description: Any combination of the writable user fields may be sent.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserWriteRequest' }
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users/{id}/profile/picture:
    put:
      tags: [Users]
      summary: Update a user's profile picture
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_picture:
                  type: array
                  items: { type: integer }
                  description: Bytes of the picture.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users/{id}/deactivate:
    put:
      tags: [Users]
      summary: Deactivate a user
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                block_reason_code:
                  type: string
                  description: Optional block reason code (see Get block reason codes).
                  example: involuntary
      responses:
        '200':
          description: The deactivated user (status `Blocked`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users/{id}/activate:
    put:
      tags: [Users]
      summary: Activate a user
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: The activated user (status `Active`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/users/{id}/permissions:
    parameters:
      - $ref: '#/components/parameters/userId'
    get:
      tags: [Users]
      summary: Get a user's permissions
      responses:
        '200':
          description: The user's permissions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Permission' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      tags: [Users]
      summary: Update a user's permissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permission_ids:
                  type: array
                  items: { type: integer }
                  description: Array of permission IDs.
      responses:
        '200':
          description: The updated permissions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Permission' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/departments:
    get:
      tags: [Departments]
      summary: List all departments
      parameters: [ { $ref: '#/components/parameters/page' }, { $ref: '#/components/parameters/size' } ]
      responses:
        '200':
          description: A paginated list of departments.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/OrgUnitSummary' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      tags: [Departments]
      summary: Create a new department
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitWriteRequest' } } }
      responses:
        '201':
          description: The created department.
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /beta/departments/{id}:
    parameters: [ { $ref: '#/components/parameters/resourceId' } ]
    get:
      tags: [Departments]
      summary: Get a single department
      responses:
        '200':
          description: The requested department.
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      tags: [Departments]
      summary: Update an existing department
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitWriteRequest' } } }
      responses:
        '200':
          description: The updated department.
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    delete:
      tags: [Departments]
      summary: Delete a department
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /beta/businesses:
    get:
      tags: [Businesses]
      summary: List all businesses
      parameters: [ { $ref: '#/components/parameters/page' }, { $ref: '#/components/parameters/size' } ]
      responses:
        '200':
          description: A paginated list of businesses.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/OrgUnitSummary' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      tags: [Businesses]
      summary: Create a new business
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitWriteRequest' } } }
      responses:
        '201':
          description: The created business.
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /beta/businesses/{id}:
    parameters: [ { $ref: '#/components/parameters/resourceId' } ]
    get:
      tags: [Businesses]
      summary: Get a single business
      responses:
        '200':
          description: The requested business.
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      tags: [Businesses]
      summary: Update an existing business
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitWriteRequest' } } }
      responses:
        '200':
          description: The updated business.
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnitEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
